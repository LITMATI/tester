<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Переводчик | Русский / Меллстройный / USB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            position: relative;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 1.5rem;
            position: relative;
            z-index: 2;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 500;
            color: #1e293b;
            text-align: center;
            margin-bottom: 1.5rem;
            letter-spacing: -0.3px;
        }
        .panel {
            display: flex;
            gap: 1rem;
            align-items: stretch;
            flex-wrap: wrap;
        }
        .box {
            flex: 1;
            min-width: 260px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 1.5rem;
            display: flex;
            flex-direction: column;
        }
        .lang-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 1rem 0 1rem;
            gap: 0.5rem;
        }
        select {
            background: #f1f5f9;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 500;
            color: #1e293b;
            cursor: pointer;
            outline: none;
        }
        textarea, .readonly-area {
            width: 100%;
            min-height: 220px;
            padding: 0.75rem 1rem 1rem 1rem;
            font-size: 1rem;
            line-height: 1.5;
            font-family: inherit;
            background: transparent;
            border: none;
            outline: none;
            resize: vertical;
            color: #0f172a;
        }
        textarea::placeholder {
            color: #cbd5e1;
        }
        .readonly-area {
            background: #fafcff;
            color: #1e293b;
            cursor: default;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .swap-btn {
            align-self: center;
            background: #f1f5f9;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 42px;
            font-size: 1.25rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            color: #475569;
            flex-shrink: 0;
        }
        .swap-btn:hover {
            background: #e2e8f0;
            transform: scale(1.02);
        }
        @media (max-width: 760px) {
            .panel {
                flex-direction: column;
            }
            .swap-btn {
                align-self: center;
                margin: 0.5rem 0;
                transform: rotate(90deg);
            }
            .swap-btn:hover {
                transform: rotate(90deg) scale(1.02);
            }
        }
        .beta-watermark {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 1000;
            font-family: monospace;
            font-weight: bold;
            font-size: clamp(3rem, 15vw, 12rem);
            color: #000000;
            opacity: 0.12;
            white-space: nowrap;
            transform: rotate(-15deg);
            letter-spacing: 0.2em;
            user-select: none;
        }
        @media (max-width: 600px) {
            .beta-watermark {
                opacity: 0.08;
                font-size: clamp(2rem, 12vw, 8rem);
            }
        }
        .status {
            text-align: center;
            margin-top: 0.5rem;
            font-size: 0.75rem;
            color: #4a6a8a;
        }
    </style>
</head>
<body>
<div class="beta-watermark" id="betaLabel">BETA 5.8</div>
<div class="container">
    <h1>Переводчик</h1>
    <div class="panel">
        <div class="box">
            <div class="lang-header">
                <select id="leftLangSelect">
                    <option value="ru">Русский</option>
                    <option value="mell">Меллстройный</option>
                    <option value="usb">USB</option>
                </select>
            </div>
            <textarea id="inputArea" placeholder="Введите текст..."></textarea>
        </div>
        <button class="swap-btn" id="swapBtn">⇄</button>
        <div class="box">
            <div class="lang-header">
                <select id="rightLangSelect">
                    <option value="mell">Меллстройный</option>
                    <option value="ru">Русский</option>
                    <option value="usb">USB</option>
                </select>
            </div>
            <div class="readonly-area" id="outputArea"></div>
        </div>
    </div>
    <div class="status" id="statusMsg">Загрузка словаря...</div>
</div>
<script>
    // ВЕРСИЯ – ТОЛЬКО РУЧНАЯ (увеличивай здесь, когда исправил баг)
    document.getElementById('betaLabel').innerText = 'BETA 5.8';

    // Словари (заполняются из dictionary.json)
    let rusToMell = new Map();
    let mellToRus = new Map();
    let rusToUsb = new Map();
    let usbToRus = new Map();
    let phraseRusToMell = [];
    let phraseMellToRus = [];
    let phraseRusToUsb = [];
    let phraseUsbToRus = [];

    // Таблицы транслитерации (только для USB)
    const cyrToLat = {
        'а':'a','б':'b','в':'v','г':'g','д':'d','е':'e','ё':'yo','ж':'zh','з':'z',
        'и':'i','й':'y','к':'k','л':'l','м':'m','н':'n','о':'o','п':'p','р':'r',
        'с':'s','т':'t','у':'u','ф':'f','х':'kh','ц':'ts','ч':'ch','ш':'sh',
        'щ':'shch','ъ':'','ы':'y','ь':'','э':'e','ю':'yu','я':'ya'
    };
    const latToCyr = {
        'a':'а','b':'б','v':'в','g':'г','d':'д','e':'е','yo':'ё','zh':'ж','z':'з',
        'i':'и','y':'й','k':'к','l':'л','m':'м','n':'н','o':'о','p':'п','r':'р',
        's':'с','t':'т','u':'у','f':'ф','kh':'х','ts':'ц','ch':'ч','sh':'ш',
        'shch':'щ','yu':'ю','ya':'я','ye':'е','yi':'ы'
    };
    function translitToLatin(t) {
        let r = '';
        for (let ch of t) {
            let low = ch.toLowerCase();
            if (cyrToLat[low]) {
                let repl = cyrToLat[low];
                if (ch === ch.toUpperCase() && ch !== low) repl = repl.charAt(0).toUpperCase() + repl.slice(1);
                r += repl;
            } else r += ch;
        }
        return r;
    }
    function translitToCyrillic(t) {
        let r = '', i = 0;
        while (i < t.length) {
            let found = false;
            for (let len = 4; len >= 1; len--) {
                let part = t.substr(i, len).toLowerCase();
                if (latToCyr[part]) {
                    let repl = latToCyr[part];
                    let orig = t.substr(i, len);
                    if (orig === orig.toUpperCase()) repl = repl.toUpperCase();
                    else if (orig[0] === orig[0].toUpperCase() && orig.slice(1).toLowerCase() === orig.slice(1))
                        repl = repl.charAt(0).toUpperCase() + repl.slice(1);
                    r += repl;
                    i += len;
                    found = true;
                    break;
                }
            }
            if (!found) { r += t[i]; i++; }
        }
        return r;
    }

    // Вспомогательные функции
    function isGarbage(w) {
        if (!w) return true;
        let l = w.toLowerCase();
        if (w.length <= 2 && !rusToMell.has(l) && !rusToUsb.has(l)) return true;
        let patterns = [/(ха){2,}/i,/(ах){2,}/i,/(ол){2,}/i,/(ло){2,}/i,/(ла){2,}/i,
            /хехе/i,/хихи/i,/хохо/i,/лол/i,/кек/i,/агага/i,/уху/i,/ааа+/i,/ыыы+/i,/еее+/i];
        for (let p of patterns) if (p.test(l)) return true;
        if (/(.)\1{3,}/i.test(l)) return true;
        if (w === w.toUpperCase() && l.length >= 4 && /^(?:[а-яa-z])(?:[^а-яa-z]?\1)+$/i.test(l)) return true;
        if (!/[аеёиоуыэюяaeiou]/i.test(l)) return true;
        return false;
    }
    function applyGeneralRule(wordLower) {
        if (wordLower.endsWith("а")) return wordLower.slice(0, -1) + "оность";
        if (wordLower.endsWith("я")) return wordLower.slice(0, -1) + "ёность";
        if (wordLower.endsWith("о")) return wordLower.slice(0, -1) + "ость";
        if (wordLower.endsWith("е")) return wordLower.slice(0, -1) + "есть";
        return wordLower + "ность";
    }
    function reverseGeneralRule(wordLower) {
        if (wordLower.endsWith("оность")) { let b = wordLower.slice(0, -6); if (b) return b + "а"; }
        if (wordLower.endsWith("ёность")) { let b = wordLower.slice(0, -6); if (b) return b + "я"; }
        if (wordLower.endsWith("ость")) { let b = wordLower.slice(0, -4); if (b) return b + "о"; }
        if (wordLower.endsWith("есть")) { let b = wordLower.slice(0, -4); if (b) return b + "е"; }
        if (wordLower.endsWith("ность")) { let b = wordLower.slice(0, -5); if (b) return b; }
        return null;
    }
    function applyCase(orig, trans) {
        if (!orig || !trans) return trans;
        if (orig === orig.toUpperCase()) return trans.toUpperCase();
        if (orig[0] === orig[0].toUpperCase() && orig.slice(1).toLowerCase() === orig.slice(1))
            return trans.charAt(0).toUpperCase() + trans.slice(1).toLowerCase();
        return trans.toLowerCase();
    }
    function tokenize(text) {
        return text.match(/([a-zA-Zа-яА-ЯёЁ]+|[^a-zA-Zа-яА-ЯёЁ]+)/g) || [];
    }

    // ПЕРЕВОДЧИКИ (используют данные, загруженные из JSON)
    function translateToMell(text) {
        if (!text.trim()) return "";
        let work = text;
        let ph = new Map(), idx = 0;
        for (let [from, to] of phraseRusToMell) {
            let esc = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            let re = new RegExp(`(^|[\\s\\p{P}])(${esc})(?=[\\s\\p{P}]|$)`, 'giu');
            work = work.replace(re, (match, before, word) => {
                let repl = to;
                if (word === word.toUpperCase()) repl = to.toUpperCase();
                else if (word[0] === word[0].toUpperCase() && word.slice(1).toLowerCase() === word.slice(1))
                    repl = to.charAt(0).toUpperCase() + to.slice(1).toLowerCase();
                else repl = to.toLowerCase();
                let p = `\uE000${idx++}\uE001`;
                ph.set(p, repl);
                return before + p;
            });
        }
        let tokens = tokenize(work);
        let out = [];
        for (let t of tokens) {
            if (ph.has(t)) { out.push(ph.get(t)); continue; }
            if (!/[a-zA-Zа-яА-ЯёЁ]/.test(t)) { out.push(t); continue; }
            let low = t.toLowerCase();
            if (rusToMell.has(low)) { out.push(applyCase(t, rusToMell.get(low))); continue; }
            if (isGarbage(t)) { out.push(t); continue; }
            out.push(applyCase(t, applyGeneralRule(low)));
        }
        return out.join('');
    }
    function translateToRus(text) {
        if (!text.trim()) return "";
        let work = text;
        let ph = new Map(), idx = 0;
        for (let [from, to] of phraseMellToRus) {
            let esc = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            let re = new RegExp(`(^|[\\s\\p{P}])(${esc})(?=[\\s\\p{P}]|$)`, 'giu');
            work = work.replace(re, (match, before, word) => {
                let repl = to;
                if (word === word.toUpperCase()) repl = to.toUpperCase();
                else if (word[0] === word[0].toUpperCase() && word.slice(1).toLowerCase() === word.slice(1))
                    repl = to.charAt(0).toUpperCase() + to.slice(1).toLowerCase();
                else repl = to.toLowerCase();
                let p = `\uE000${idx++}\uE001`;
                ph.set(p, repl);
                return before + p;
            });
        }
        let tokens = tokenize(work);
        let out = [];
        for (let t of tokens) {
            if (ph.has(t)) { out.push(ph.get(t)); continue; }
            if (!/[a-zA-Zа-яА-ЯёЁ]/.test(t)) { out.push(t); continue; }
            let low = t.toLowerCase();
            if (mellToRus.has(low)) { out.push(applyCase(t, mellToRus.get(low))); continue; }
            let rec = reverseGeneralRule(low);
            if (rec) out.push(applyCase(t, rec));
            else out.push(t);
        }
        let res = out.join('');
        res = res.replace(/\bЧ\b/g, 'Я').replace(/\bч\b/g, 'я');
        return res;
    }
    function translateToUsb(text) {
        if (!text.trim()) return "";
        let work = text;
        let ph = new Map(), idx = 0;
        for (let [from, to] of phraseRusToUsb) {
            let esc = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            let re = new RegExp(`(^|[\\s\\p{P}])(${esc})(?=[\\s\\p{P}]|$)`, 'giu');
            work = work.replace(re, (match, before, word) => {
                let repl = to;
                if (word === word.toUpperCase()) repl = to.toUpperCase();
                else if (word[0] === word[0].toUpperCase() && word.slice(1).toLowerCase() === word.slice(1))
                    repl = to.charAt(0).toUpperCase() + to.slice(1).toLowerCase();
                else repl = to.toLowerCase();
                let p = `\uE000${idx++}\uE001`;
                ph.set(p, repl);
                return before + p;
            });
        }
        let tokens = tokenize(work);
        let out = [];
        for (let t of tokens) {
            if (ph.has(t)) { out.push(ph.get(t)); continue; }
            if (!/[a-zA-Zа-яА-ЯёЁ]/.test(t)) { out.push(t); continue; }
            let low = t.toLowerCase();
            if (rusToUsb.has(low)) { out.push(applyCase(t, rusToUsb.get(low))); continue; }
            out.push(translitToLatin(t));
        }
        return out.join('');
    }
    function translateFromUsb(text) {
        if (!text.trim()) return "";
        let work = text;
        let ph = new Map(), idx = 0;
        for (let [from, to] of phraseUsbToRus) {
            let esc = from.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            let re = new RegExp(`(^|[\\s\\p{P}])(${esc})(?=[\\s\\p{P}]|$)`, 'giu');
            work = work.replace(re, (match, before, word) => {
                let repl = to;
                if (word === word.toUpperCase()) repl = to.toUpperCase();
                else if (word[0] === word[0].toUpperCase() && word.slice(1).toLowerCase() === word.slice(1))
                    repl = to.charAt(0).toUpperCase() + to.slice(1).toLowerCase();
                else repl = to.toLowerCase();
                let p = `\uE000${idx++}\uE001`;
                ph.set(p, repl);
                return before + p;
            });
        }
        let tokens = tokenize(work);
        let out = [];
        for (let t of tokens) {
            if (ph.has(t)) { out.push(ph.get(t)); continue; }
            if (!/[a-zA-Z]/.test(t)) { out.push(t); continue; }
            let low = t.toLowerCase();
            if (usbToRus.has(low)) { out.push(applyCase(t, usbToRus.get(low))); continue; }
            out.push(translitToCyrillic(t));
        }
        return out.join('');
    }

    // ЗАГРУЗКА СЛОВАРЯ ИЗ ФАЙЛА dictionary.json (ГИТХАБ)
    async function loadDictionary() {
        try {
            let resp = await fetch('dictionary.json');
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            let dict = await resp.json();

            // Очистка перед загрузкой
            rusToMell.clear();
            mellToRus.clear();
            rusToUsb.clear();
            usbToRus.clear();

            // Основные словари
            if (dict.rusToMell) {
                for (let [k, v] of Object.entries(dict.rusToMell)) {
                    rusToMell.set(k.toLowerCase(), v);
                }
            }
            if (dict.rusToUsb) {
                for (let [k, v] of Object.entries(dict.rusToUsb)) {
                    rusToUsb.set(k.toLowerCase(), v);
                }
            }

            // Обратные отображения
            for (let [rus, mell] of rusToMell.entries()) {
                mellToRus.set(mell.toLowerCase(), rus);
            }
            for (let [rus, usb] of rusToUsb.entries()) {
                usbToRus.set(usb.toLowerCase(), rus);
            }

            // Дополнительные обратные соответствия (если есть)
            if (dict.extraReverse) {
                for (let [m, r] of Object.entries(dict.extraReverse)) {
                    if (!mellToRus.has(m.toLowerCase())) mellToRus.set(m.toLowerCase(), r);
                }
            }
            if (dict.extraUsbReverse) {
                for (let [u, r] of Object.entries(dict.extraUsbReverse)) {
                    if (!usbToRus.has(u.toLowerCase())) usbToRus.set(u.toLowerCase(), r);
                }
            }

            // Фразы (составные выражения) – обязательно из JSON
            phraseRusToMell = dict.phrases?.rusToMell || [];
            phraseMellToRus = dict.phrases?.mellToRus || [];
            phraseRusToUsb = dict.phrases?.rusToUsb || [];
            phraseUsbToRus = dict.phrases?.usbToRus || [];

            // Сортировка для корректной замены (от длинных к коротким)
            phraseRusToMell.sort((a,b)=>b[0].length - a[0].length);
            phraseMellToRus.sort((a,b)=>b[0].length - a[0].length);
            phraseRusToUsb.sort((a,b)=>b[0].length - a[0].length);
            phraseUsbToRus.sort((a,b)=>b[0].length - a[0].length);

            document.getElementById('statusMsg').innerHTML = 'Словарь загружен';
            updateTranslation(); // применяем перевод
        } catch(e) {
            console.error(e);
            document.getElementById('statusMsg').innerHTML = 'Ошибка загрузки dictionary.json. Проверьте файл.';
        }
    }

    // UI
    const inputArea = document.getElementById('inputArea');
    const outputArea = document.getElementById('outputArea');
    const leftLang = document.getElementById('leftLangSelect');
    const rightLang = document.getElementById('rightLangSelect');
    const swapBtn = document.getElementById('swapBtn');

    function updateTranslation() {
        let src = leftLang.value, dst = rightLang.value;
        if (src === dst) {
            outputArea.innerText = inputArea.value;
            return;
        }
        let text = inputArea.value;
        let result;
        if (src === 'ru' && dst === 'mell') result = translateToMell(text);
        else if (src === 'mell' && dst === 'ru') result = translateToRus(text);
        else if (src === 'ru' && dst === 'usb') result = translateToUsb(text);
        else if (src === 'usb' && dst === 'ru') result = translateFromUsb(text);
        else if (src === 'mell' && dst === 'usb') result = translateToUsb(translateToRus(text));
        else if (src === 'usb' && dst === 'mell') result = translateToMell(translateFromUsb(text));
        else result = text;
        outputArea.innerText = result;
    }

    let timer;
    function debounced() {
        clearTimeout(timer);
        timer = setTimeout(updateTranslation, 250);
    }
    inputArea.addEventListener('input', debounced);
    leftLang.addEventListener('change', () => {
        if (leftLang.value === rightLang.value) {
            let other = leftLang.value === 'ru' ? 'mell' : (leftLang.value === 'mell' ? 'usb' : 'ru');
            rightLang.value = other;
        }
        debounced();
    });
    rightLang.addEventListener('change', () => {
        if (rightLang.value === leftLang.value) {
            let other = rightLang.value === 'ru' ? 'mell' : (rightLang.value === 'mell' ? 'usb' : 'ru');
            leftLang.value = other;
        }
        debounced();
    });
    swapBtn.addEventListener('click', () => {
        let l = leftLang.value, r = rightLang.value;
        leftLang.value = r;
        rightLang.value = l;
        let lt = inputArea.value, rt = outputArea.innerText;
        inputArea.value = rt;
        updateTranslation();
    });

    // Стартовый текст (пример)
    inputArea.value = 'нормально, попа, жопа, училка, нет, почему, хай, шприц';
    loadDictionary();
</script>
</body>
</html>
